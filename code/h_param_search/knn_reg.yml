n_neighbors:
  type: int
  min: 1
  max: 30
  log: False

weights:
  type: categorical
  values:
    - uniform
    - distance

algorithm:
  type: categorical
  values:
    - ball_tree
    - kd_tree
    - brute
  
  extra_parameters:
    ball_tree:
      leaf_size:
        type: int
        min: 5
        max: 100
        log: False
    
    kd_tree:
      leaf_size:
        type: int
        min: 5
        max: 100
        log: False

p:
  type: float
  min: 1
  max: 3
  log: False
