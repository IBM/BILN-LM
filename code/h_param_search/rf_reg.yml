n_estimators:
  type: int
  min: 10
  max: 5000
  log: False

criterion:
  type: categorical
  values:
    - squared_error
    - absolute_error
    - friedman_mse

min_samples_split:
  type: int
  min: 2
  max: 100
  log: False

max_features:
  type: categorical
  values:
    - log2
    - sqrt

ccp_alpha:
  type: float
  min: 1e-10
  max: 1e-3
  log: True


